<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Ask Codex - Property Inspector</title>
    <link rel="stylesheet" href="../../static/css/sdpi.css">
</head>

<body>
    <div class="sdpi-wrapper" style="display: none">
        <div class="sdpi-heading">Ask Codex</div>

        <div class="sdpi-item" type="field">
            <div class="sdpi-item-label">API Key</div>
            <input class="sdpi-item-value" id="apiKey" type="password"
                placeholder="Enter your OpenAI API key" />
        </div>

        <div class="sdpi-item" type="select">
            <div class="sdpi-item-label">Model</div>
            <select class="sdpi-item-value" id="model">
                <option value="gpt-4o-mini">gpt-4o-mini</option>
                <option value="gpt-4o">gpt-4o</option>
                <option value="gpt-4-turbo">gpt-4-turbo</option>
                <option value="gpt-4">gpt-4</option>
                <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
                <option value="o1-mini">o1-mini</option>
                <option value="o1-preview">o1-preview</option>
            </select>
        </div>

        <div class="sdpi-item textarea" type="textarea">
            <div class="sdpi-item-label">Prompt</div>
            <div class="sdpi-item-value">
                <textarea id="prompt" rows="4"
                    placeholder="Enter a prompt template"></textarea>
            </div>
        </div>

        <div class="sdpi-item" type="field">
            <div class="sdpi-item-label">Max Tokens</div>
            <input class="sdpi-item-value" id="maxTokens" type="number"
                min="1" max="4096" placeholder="256" />
        </div>

        <div class="sdpi-item" type="range">
            <div class="sdpi-item-label">Temperature</div>
            <div class="sdpi-item-value range">
                <span id="temperatureMin">0</span>
                <input type="range" id="temperature" min="0" max="2" step="0.1" />
                <span id="temperatureMax">2</span>
            </div>
        </div>
    </div>
    <script src="../utils/common.js"></script>
    <script src="../utils/action.js"></script>
    <script src="index.js"></script>
</body>

</html>
